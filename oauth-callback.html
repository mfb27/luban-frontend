<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub OAuth Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 50%, #fae8ff 100%);
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      margin-top: 16px;
      color: #64748b;
    }
    .error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <div class="message">正在处理 GitHub 登录...</div>
  </div>
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");
      const userId = urlParams.get("user_id");
      const name = urlParams.get("name");

      // Send message to parent window (the main app window that opened this popup)
      if (window.opener) {
        // Send message with "*" target to ensure it reaches the parent
        // The parent will verify the message type
        window.opener.postMessage({
          type: "github_oauth_result",
          success: token && userId,
          token: token,
          user_id: userId,
          name: name,
          error: !token ? "OAuth 登录失败" : null
        }, "*");

        // Close popup after a longer delay to ensure message is delivered
        setTimeout(() => {
          window.close();
        }, 500);
      } else {
        // No opener - redirect flow
        // Store token and redirect to main page
        if (token && userId) {
          window.location.href = window.location.origin + "/?token=" + encodeURIComponent(token) + "&user_id=" + encodeURIComponent(userId) + "&name=" + encodeURIComponent(name || "");
        } else {
          window.location.href = window.location.origin + "/?error=OAuth%20登录失败";
        }
      }
    })();
  </script>
</body>
</html>
