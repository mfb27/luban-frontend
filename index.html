<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luban Chat</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <div class="brand-logo">L</div>
            <div class="brand-text">
              <div class="brand-name">Luban</div>
              <!-- <div class="brand-sub">Qwen-style UI</div> -->
            </div>
          </div>

          <button id="newChatBtn" class="btn primary">新建对话</button>
        </div>

        <div class="sidebar-section">
          <div class="section-title">历史记录</div>
          <div id="sessionsList" class="sessions"></div>
        </div>

        <div class="sidebar-footer">
          <button id="meBtn" class="me">
            <img id="meAvatar" class="me-avatar hidden" alt="avatar" src="images/luban1.jpeg" />
            <div class="me-meta">
              <div id="meName" class="me-name">登录/注册</div>
              <!-- <div class="me-sub">个人中心</div> -->
            </div>
          </button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-left">
            <button
              id="sidebarToggle"
              class="icon-btn"
              type="button"
              aria-label="切换侧边栏"
            >
              <svg class="icon-menu" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 12h18M3 6h18M3 18h18"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <div class="model-switcher">
              <select id="modelSelect" class="select model-select"></select>
            </div>
          </div>
          <div class="topbar-right">
            <button
              id="themeToggle"
              class="icon-btn"
              type="button"
              aria-label="切换背景模式"
            >
              <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4.5" />
                <g stroke-linecap="round">
                  <line x1="12" y1="2" x2="12" y2="5" />
                  <line x1="12" y1="19" x2="12" y2="22" />
                  <line x1="4.22" y1="4.22" x2="6.34" y2="6.34" />
                  <line x1="17.66" y1="17.66" x2="19.78" y2="19.78" />
                  <line x1="2" y1="12" x2="5" y2="12" />
                  <line x1="19" y1="12" x2="22" y2="12" />
                  <line x1="4.22" y1="19.78" x2="6.34" y2="17.66" />
                  <line x1="17.66" y1="6.34" x2="19.78" y2="4.22" />
                </g>
              </svg>
            </button>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <div id="dialogOverlay" class="dialog-overlay hidden">
          <!-- Login/Register Modal -->
          <dialog id="authDialog" class="dialog auth-dialog">
            <div class="dialog-header">
              <div class="dialog-title">登录 / 注册</div>
              <button id="authClose" class="btn ghost" type="button">关闭</button>
            </div>
            <div class="dialog-body">
              <!-- Tabs -->
              <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">登录</button>
                <button class="auth-tab" data-tab="register">注册</button>
              </div>

              <!-- Login Form -->
              <form id="loginForm" class="auth-form">
                <div class="form-group">
                  <label for="loginEmail">邮箱</label>
                  <input type="email" id="loginEmail" required placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                  <label for="loginPassword">密码</label>
                  <input type="password" id="loginPassword" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn primary">登录</button>
                <div class="auth-divider">
                  <span>或</span>
                </div>
                <button type="button" id="githubLoginBtn" class="btn github-btn">
                  <svg class="icon-github" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                    <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                  </svg>
                  使用 GitHub 登录
                </button>
              </form>

              <!-- Register Form -->
              <form id="registerForm" class="auth-form hidden">
                <div class="form-group">
                  <label for="registerName">姓名</label>
                  <input type="text" id="registerName" required placeholder="请输入姓名">
                </div>
                <div class="form-group">
                  <label for="registerEmail">邮箱</label>
                  <input type="email" id="registerEmail" required placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                  <label for="registerPassword">密码</label>
                  <input type="password" id="registerPassword" required placeholder="请输入密码">
                  <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar"></div>
                    <span class="strength-text"></span>
                  </div>
                  <small class="password-hint">至少6位，建议包含字母和数字</small>
                </div>
                <button type="submit" class="btn primary">注册</button>
                <div class="auth-divider">
                  <span>或</span>
                </div>
                <button type="button" id="githubRegisterBtn" class="btn github-btn">
                  <svg class="icon-github" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                    <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                  </svg>
                  使用 GitHub 注册
                </button>
              </form>
            </div>
          </dialog>

          <dialog id="meDialog" class="dialog">
            <div class="dialog-header">
              <div class="dialog-title">个人信息</div>
              <button id="meClose" class="btn ghost" type="button">关闭</button>
            </div>
            <div class="dialog-body">
              <div class="me-card">
                <img id="meAvatar2" class="me-avatar-lg" alt="avatar" />
                <div>
                  <div id="meName2" class="me-name-lg">-</div>
                  <div id="meId" class="me-id">-</div>
                </div>
              </div>
              <div class="dialog-footer">
                <button id="logoutBtn" class="btn secondary logout-btn">
                  <svg class="icon-logout" viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M16 17v-3h4a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-4v3l-4-4 4-4v3h4a4 4 0 0 1 4 4v6a4 4 0 0 1-4 4h-4z"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                  退出登录
                </button>
              </div>
            </div>
          </dialog>
        </div>

        <div class="composer-shell" style="max-width: 750px !important; width: 90%;">
          <textarea
            id="prompt"
            class="textarea"
            rows="3"
            placeholder="发送消息，Enter 发送，Shift+Enter 换行"
          ></textarea>
          <div class="composer-actions">
            <div class="composer-actions-left">
              <label class="upload-btn" aria-label="上传图片或视频">
                <input id="fileInput" type="file" accept="image/*,video/*" />
                <svg class="icon-upload" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 3.5v11m0-11L8 7.5m4-4 4 4M5 14.5v3a2.5 2.5 0 0 0 2.5 2.5h9A2.5 2.5 0 0 0 19 17.5v-3"
                    fill="none"
                    stroke-width="1.6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </label>
            </div>
            <div class="composer-actions-right">
              <div id="attachments" class="attachments"></div>
              <button id="sendBtn" class="icon-btn send-btn" type="button" aria-label="发送">
                <svg class="icon-send" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 19V5M12 5l6 6M12 5l-6 6"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div id="errorBar" class="error-bar hidden"></div>
        </div>
      </main>
    </div>

    <script src="./js/app.js?v=1.0.0"></script>
  </body>
</html>
